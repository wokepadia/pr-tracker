services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pr_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pr_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
